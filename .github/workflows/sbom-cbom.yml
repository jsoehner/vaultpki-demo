name: Generate SBOM and CBOM

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  generate-boms:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Create oss directory
        run: mkdir -p oss

      - name: Build Docker Image
        run: docker build -t my-demo-app:local .

      - name: Generate SBOM from Container Image
        uses: anchore/sbom-action@v0
        with:
          image: my-demo-app:local
          format: spdx-json
          output-file: oss/sbom.spdx.json

      - name: Set up Node.js for cdxgen
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install cdxgen
        run: npm install -g @cyclonedx/cdxgen

      - name: Generate CBOM from Container Image
        run: cdxgen -t docker --include-crypto -o oss/cbom.json my-demo-app:local

      - name: Upload BOM Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: oss-boms
          path: oss/
          retention-days: 30
