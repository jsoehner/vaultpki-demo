server {
    listen 443 ssl;
    server_name test.example.com;

    ssl_certificate /certs/test.example.com.crt;
    ssl_certificate_key /certs/test.example.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        add_header Content-Type text/plain;
        return 200 "Hello from securely running NGINX using Vault PKI and Vault Agent!\n";
    }
}
